services:
  - type: web
    name: renegade-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && (pip3 install -r ../discovery/requirements.txt || pip install -r ../discovery/requirements.txt || python3 -m pip install -r ../discovery/requirements.txt || python -m pip install -r ../discovery/requirements.txt)
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
